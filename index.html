<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Snake</h1>
      <section class="hud" aria-label="Game status">
        <p id="score">Score: 0</p>
        <p id="status">Running</p>
      </section>

      <section id="board" class="board" aria-label="Snake game board"></section>

      <section class="controls" aria-label="Game controls">
        <button type="button" data-dir="UP" aria-label="Move up">↑</button>
        <div class="controls-row">
          <button type="button" data-dir="LEFT" aria-label="Move left">←</button>
          <button type="button" data-dir="DOWN" aria-label="Move down">↓</button>
          <button type="button" data-dir="RIGHT" aria-label="Move right">→</button>
        </div>
      </section>

      <section class="actions" aria-label="Game actions">
        <button id="pause-btn" type="button">Pause</button>
        <button id="restart-btn" type="button">Restart</button>
      </section>

      <p class="help">Use arrow keys or WASD. Press Space/P to pause.</p>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
